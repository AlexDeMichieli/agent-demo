# Background Coding Agent Workflow
#
# BUILDING BLOCKS DEMONSTRATED:
#   L01 - Agent Loop:         agent.py runs the full plan → code → review loop
#   L06 - Capability Sep:     Job 1 (agent) is READ-ONLY, Job 2 (apply) has WRITE
#   L10 - Observability:      Every step is logged in Actions, visible in run history
#   Sandbox concept:          Agent runs in an ephemeral runner, destroyed after
#
# TRIGGER: When an issue gets the "agent-fix" label
# FLOW:    agent job (read-only) → apply job (write, opens PR)

name: Background Coding Agent

on:
  issues:
    types: [labeled]

jobs:
  # ==========================================================================
  # JOB 1: AGENT (READ-ONLY SANDBOX)
  #
  # This job runs the LLM-powered agent. It can READ the repo and the issue,
  # but CANNOT write to the repo, push branches, or open PRs.
  #
  # The agent outputs artifacts (plan, diff, summary) that the next job picks up.
  #
  # Building blocks:
  #   L06 - The agent has no write tokens. Even if prompt-injected, it can't
  #         push code or modify the repo. The sandbox is enforced by Actions
  #         permissions, not by the agent's own code.
  # ==========================================================================
  agent:
    # Only run when the label is "agent-fix"
    if: github.event.label.name == 'agent-fix'
    runs-on: ubuntu-latest

    # PERMISSIONS: read-only. The agent CANNOT write to the repo.
    permissions:
      contents: read
      issues: read

    steps:
      - name: Checkout repo (read-only)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Run the agent. It reads the issue from GITHUB_EVENT_PATH (set by Actions)
      # and writes output to agent-output/
      - name: Run coding agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python agent/agent.py \
            --issue-number ${{ github.event.issue.number }} \
            --repo-path .

      # Upload the agent's output as an artifact.
      # This is the ONLY thing that leaves the sandbox.
      # The apply job downloads this artifact and uses it.
      - name: Upload agent output
        uses: actions/upload-artifact@v4
        with:
          name: agent-output
          path: agent-output/

  # ==========================================================================
  # JOB 2: APPLY (SCOPED WRITE ACCESS, NO LLM)
  #
  # This job takes the agent's output and opens a PR. It has write access
  # but does NOT run any LLM. It's purely deterministic.
  #
  # Building blocks:
  #   L06 - Capability separation: "the component with power is not an LLM"
  #         This job can write but doesn't think. The agent thinks but can't write.
  # ==========================================================================
  apply:
    needs: agent
    runs-on: ubuntu-latest

    # PERMISSIONS: write access to create branches and PRs
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download agent output
        uses: actions/download-artifact@v4
        with:
          name: agent-output
          path: agent-output/

      # Show what the agent produced (observability / debug)
      - name: Display agent plan
        run: cat agent-output/plan.md

      - name: Display agent review
        run: cat agent-output/summary.md

      - name: Display generated diff
        run: cat agent-output/fix.diff

      # ================================================================
      # VALIDATION GATE (deterministic, no LLM)
      #
      # The agent's output is UNTRUSTED INPUT. We validate it the same
      # way we'd validate user-submitted code. All checks here are
      # deterministic — no LLM opinions, just hard rules.
      #
      # Building blocks: L06 (trustworthy agents), L09 (validation)
      # ================================================================
      - name: Validate agent output
        run: |
          echo "=== VALIDATING AGENT OUTPUT ==="

          # 1. Diff size check — if it's huge, the agent may be going rogue
          LINES=$(wc -l < agent-output/fix.diff)
          echo "Diff size: $LINES lines"
          if [ "$LINES" -gt 500 ]; then
            echo "FAIL: Diff is $LINES lines. Max allowed: 500."
            exit 1
          fi
          echo "PASS: Diff size OK"

          # 2. Path check — only allow changes to src/ and tests/
          #    Prevents the agent from modifying workflows, configs, etc.
          PATHS=$(grep "^+++ b/" agent-output/fix.diff | sed 's|+++ b/||' || true)
          if [ -n "$PATHS" ]; then
            for P in $PATHS; do
              case "$P" in
                src/*|tests/*) echo "PASS: Allowed path: $P" ;;
                *) echo "FAIL: Diff touches forbidden path: $P"; exit 1 ;;
              esac
            done
          fi
          echo "PASS: All paths OK"

          # 3. Secret scan — reject if diff contains anything that looks like a key
          if grep -iE "(api_key|password|secret_key|access_token|private_key)\s*=" agent-output/fix.diff; then
            echo "FAIL: Diff may contain secrets"
            exit 1
          fi
          echo "PASS: No secrets detected"

          # 4. No binary content
          if grep -P '\x00' agent-output/fix.diff 2>/dev/null; then
            echo "FAIL: Diff contains binary content"
            exit 1
          fi
          echo "PASS: No binary content"

          echo "=== ALL VALIDATION CHECKS PASSED ==="

      # Apply the diff, run tests, then open the PR
      # This is deterministic — no LLM involved
      - name: Apply fix
        run: |
          # Apply the diff
          # Try multiple strategies since LLM-generated diffs can be slightly malformed
          if git apply agent-output/fix.diff 2>/dev/null; then
            echo "Diff applied cleanly with git apply"
          elif git apply --3way agent-output/fix.diff 2>/dev/null; then
            echo "Diff applied with 3-way merge"
          elif patch -p1 < agent-output/fix.diff 2>/dev/null; then
            echo "Diff applied with patch command"
          else
            echo "WARNING: Diff failed to apply. Trying direct file replacement..."
            if [ -d agent-output/files ]; then
              cp -r agent-output/files/* .
              echo "Applied full file replacements"
            else
              echo "ERROR: All apply methods failed. Dumping diff:"
              cat agent-output/fix.diff
              exit 1
            fi
          fi

      # 5. Run tests AFTER applying the fix — the ultimate validation gate
      #    If the fix breaks tests, we don't open a PR. (L09 metacognition)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests after fix
        run: |
          echo "=== RUNNING TESTS AFTER FIX ==="
          pip install pytest
          python -m pytest tests/ -v
          echo "=== ALL TESTS PASSED ==="

      # If we get here, validation passed and tests pass → open the PR
      - name: Commit and push branch
        run: |
          # Configure git
          git config user.name "coding-agent[bot]"
          git config user.email "coding-agent[bot]@users.noreply.github.com"

          # Create a branch for the fix
          BRANCH="agent/fix-issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"

          # Stage and commit (only tracked files, .gitignore handles junk)
          git add -A
          git commit -m "Agent fix for #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          git push origin "$BRANCH"

      - name: Create PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('agent-output/plan.md', 'utf8');
            const summary = fs.readFileSync('agent-output/summary.md', 'utf8');
            const issueNumber = context.payload.issue.number;
            const issueTitle = context.payload.issue.title;
            const branch = `agent/fix-issue-${issueNumber}`;

            try {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Agent: fix #${issueNumber} - ${issueTitle}`,
                head: branch,
                base: 'main',
                body: `## Automated Fix for #${issueNumber}\n\n${plan}\n\n---\n\n${summary}\n\n---\n*This PR was generated by a background coding agent. Please review before merging.*`
              });
              console.log(`PR created: ${pr.html_url}`);
            } catch (error) {
              const errorMessage = error.response?.data?.message || '';
              if (
                error.status === 403 &&
                (
                  errorMessage === 'GitHub Actions is not permitted to create or approve pull requests.' ||
                  errorMessage.includes('create or approve pull requests')
                )
              ) {
                core.warning(
                  'Skipping PR creation because repository settings currently disallow GitHub Actions from creating PRs.'
                );
                core.notice(
                  `Branch pushed successfully (${branch}). Enable "Allow GitHub Actions to create and approve pull requests" in repository settings to auto-open PRs.`
                );
              } else {
                throw error;
              }
            }
